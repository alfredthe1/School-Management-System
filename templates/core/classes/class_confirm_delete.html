{% extends 'base.html' %}
{% block page_title %}Delete Class{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle display-4 text-danger"></i>
                <h4 class="mt-3">Delete {{ classroom.display_name }}?</h4>
                <p class="text-muted">This will remove all subjects linked to this class. Students will need reassignment.</p>
                <form method="post" class="swal-confirm-form" data-swal-title="Delete class?" data-swal-text="This cannot be undone.">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
                    <a href="{% url 'core:class_detail' classroom.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
