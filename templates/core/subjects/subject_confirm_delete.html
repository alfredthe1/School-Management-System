{% extends 'base.html' %}
{% block page_title %}Delete Subject{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center p-4">
                <i class="bi bi-trash display-4 text-danger"></i>
                <h4 class="mt-3">Remove {{ subject.name }}?</h4>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'core:class_detail' subject.class_room_id %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
