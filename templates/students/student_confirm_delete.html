{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-header bg-danger text-white">
                <h5><i class="bi bi-exclamation-triangle"></i> Confirm Delete</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ student.get_full_name }}</strong>?</p>
                <form method="post" class="swal-confirm-form"
                      data-swal-title="Delete {{ student.get_full_name }}?"
                      data-swal-text="This action cannot be undone.">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'students:list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
