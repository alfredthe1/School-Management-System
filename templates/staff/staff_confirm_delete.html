{% extends 'base.html' %}
{% block page_title %}Delete Staff{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow">
            <div class="card-body text-center p-4">
                <i class="bi bi-exclamation-triangle text-danger display-4"></i>
                <h4 class="mt-3">Delete {{ object.get_full_name }}?</h4>
                <p class="text-muted">This removes the staff HR record and payroll history. The user account is kept.</p>
                <form method="post" class="d-flex justify-content-center gap-2 mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'staff:detail' object.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
