{% extends 'base.html' %}
{% block page_title %}Create Announcement{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-header text-white py-3" style="background: linear-gradient(135deg, #1E3A5F, #2C7BB6);">
        <h4 class="mb-0"><i class="bi bi-megaphone-fill"></i> Publish Announcement</h4>
        <p class="mb-0 small opacity-75">Notifies teachers and parents via the notification bell</p>
    </div>
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-medium"><i class="bi bi-card-heading"></i> Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium"><i class="bi bi-chat-text"></i> Content</label>
                <textarea name="content" class="form-control" rows="5" required></textarea>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-medium"><i class="bi bi-flag"></i> Priority</label>
                    <select name="priority" class="form-select">
                        <option value="low"><i class="bi bi-info-circle"></i> Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-medium"><i class="bi bi-people"></i> Target Audience</label>
                    <input type="text" name="target_roles" class="form-control" value="parent,teacher" placeholder="parent,teacher,bursar">
                    <small class="text-muted">Comma-separated roles to notify</small>
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i> Publish &amp; Notify</button>
            <a href="{% url 'announcements:list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
