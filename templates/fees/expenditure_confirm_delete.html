{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">Confirm Delete</div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ expenditure.description }}</strong>?</p>
                <form method="post" class="swal-confirm-form"
                      data-swal-title="Delete expenditure?"
                      data-swal-text="Remove {{ expenditure.description }}?">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'fees:expenditure_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
