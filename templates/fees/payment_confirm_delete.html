{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-header bg-danger text-white">
                <h5><i class="bi bi-exclamation-triangle"></i> Confirm Delete</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete this payment of <strong>UGX {{ payment.amount_paid|floatformat:0 }}</strong> for <strong>{{ student.get_full_name }}</strong>?</p>
                <form method="post" class="swal-confirm-form"
                      data-swal-title="Delete payment?"
                      data-swal-text="Remove UGX {{ payment.amount_paid|floatformat:0 }} for {{ student.get_full_name }}?">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'fees:student_fees' student.id %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
