{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-header bg-danger text-white">
                <h5><i class="bi bi-exclamation-triangle"></i> Confirm Delete</h5>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ teacher.get_full_name }}</strong>?</p>
                <p class="text-muted small">This will also delete the associated user account.</p>
                <form method="post" class="swal-confirm-form"
                      data-swal-title="Delete {{ teacher.get_full_name }}?"
                      data-swal-text="This will remove the teacher and their login account.">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'teachers:list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
