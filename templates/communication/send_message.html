{% extends 'base.html' %}
{% block page_title %}Compose Message{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-header text-white py-3" style="background: linear-gradient(135deg, #1E3A5F, #2C7BB6);">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Compose Message</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-person"></i> Recipient</label>
                        <select name="recipient" class="form-select" required>
                            {% for r in recipients %}
                            <option value="{{ r.id }}">{{ r.get_full_name|default:r.username }} ({{ r.get_role_display|default:r.role }})</option>
                            {% endfor %}
                        </select>
                        {% if can_send_to_parents %}
                        <small class="text-muted"><i class="bi bi-info-circle"></i> You can message teachers, staff, and parents.</small>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-flag"></i> Priority</label>
                        <select name="priority" class="form-select">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-card-heading"></i> Title</label>
                        <input type="text" name="title" class="form-control" required placeholder="Message subject">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-chat-text"></i> Message</label>
                        <textarea name="message" class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i> Send Message</button>
                    <a href="{% url 'communication:inbox' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
