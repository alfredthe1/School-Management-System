{% extends 'base.html' %}
{% block page_title %}Bulk Communication{% endblock %}
{% block content %}
<div class="card border-0 shadow-sm rounded-4">
    <div class="card-header text-white py-3" style="background: linear-gradient(135deg, #1E3A5F, #2C7BB6);">
        <h4 class="mb-0"><i class="bi bi-broadcast"></i> Bulk SMS &amp; Email</h4>
        <p class="mb-0 small opacity-75">Notify teachers and parents via SMS, email, and in-app alerts</p>
    </div>
    <div class="card-body p-4">
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="text-center p-3 rounded-3 bg-light">
                    <i class="bi bi-phone-fill text-success fs-2"></i>
                    <p class="small mb-0 mt-2">SMS via mobile network</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="text-center p-3 rounded-3 bg-light">
                    <i class="bi bi-envelope-fill text-primary fs-2"></i>
                    <p class="small mb-0 mt-2">Email notifications</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="text-center p-3 rounded-3 bg-light">
                    <i class="bi bi-bell-fill text-warning fs-2"></i>
                    <p class="small mb-0 mt-2">In-app notification bell</p>
                </div>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-medium"><i class="bi bi-people"></i> Recipient Group</label>
                <select name="role" class="form-select" required>
                    <option value="parent"><i class="bi bi-people"></i> Parents</option>
                    <option value="teacher">Teachers</option>
                    <option value="bursar">Bursar</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium"><i class="bi bi-card-heading"></i> Subject</label>
                <input type="text" name="subject" class="form-control" value="{{ school_name }} — Notice">
            </div>
            <div class="mb-3">
                <label class="form-label fw-medium"><i class="bi bi-chat-text"></i> Message</label>
                <textarea name="message" class="form-control" rows="5" required placeholder="Write your message to parents or teachers..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i> Send Bulk Notification</button>
        </form>
    </div>
</div>
{% endblock %}
