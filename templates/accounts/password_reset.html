{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="card border-0 shadow-lg rounded-4">
            <div class="card-header bg-gradient text-white py-3" style="background: linear-gradient(135deg, #2C7BB6, #4AA3DF);">
                <h4 class="mb-0"><i class="bi bi-envelope"></i> Reset Password</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Link</button>
                </form>
                <hr>
                <p class="text-center"><a href="{% url 'accounts:login' %}">Back to Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
