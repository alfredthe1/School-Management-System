{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center" style="min-height: 60vh;">
    <div class="col-md-5 text-center">
        <div class="card border-0 shadow">
            <div class="card-body p-5">
                <i class="bi bi-envelope-check display-4 text-success"></i>
                <h4 class="mt-3">Check your email</h4>
                <p class="text-muted">If an account exists with that email, we've sent password reset instructions.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
