{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center" style="min-height: 60vh;">
    <div class="col-md-5 text-center">
        <div class="card border-0 shadow">
            <div class="card-body p-5">
                <i class="bi bi-check-circle display-4 text-success"></i>
                <h4 class="mt-3">Password Reset Complete</h4>
                <p class="text-muted">Your password has been updated. You can now sign in.</p>
                <a href="{% url 'accounts:login' %}" class="btn btn-primary">Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
