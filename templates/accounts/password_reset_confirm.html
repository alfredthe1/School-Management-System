{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="row justify-content-center" style="min-height: 60vh;">
    <div class="col-md-5">
        <div class="card border-0 shadow">
            <div class="card-header bg-primary text-white">Set New Password</div>
            <div class="card-body p-4">
                {% if validlink %}
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary w-100">Reset Password</button>
                </form>
                {% else %}
                <p class="text-danger">This reset link is invalid or has expired. Please request a new one.</p>
                <a href="{% url 'accounts:password_reset' %}" class="btn btn-primary">Request New Link</a>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
